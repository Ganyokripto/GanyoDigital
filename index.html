<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GanyoKripto | Place Order</title>
    <style>
        :root { --primary: #0056b3; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .order-container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: var(--primary); text-align: center; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #555; }
        input, select { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; background: var(--primary); color: white; padding: 1rem; border: none; border-radius: 6px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #004494; }
        .footer-text { text-align: center; font-size: 0.8rem; color: #888; margin-top: 1rem; }
    </style>
</head>
<body>

<div class="order-container">
    <h2>GanyoKripto Order</h2>
    <!-- To make this functional, we will need to link it to your Google Sheet later -->
    <form id="orderForm">
        <div class="form-group">
            <label>Data Number</label>
            <input type="text" name="data_number" placeholder="024XXXXXXX" required>
        </div>

        <div class="form-group">
            <label>Select Network</label>
            <select name="network">
                <option>MTN Ghana</option>
                <option>Telecel (Vodafone)</option>
                <option>AirtelTigo</option>
            </select>
        </div>

        <div class="form-group">
            <label>Select Bundle</label>
            <select name="bundle">
                <option>1GB - GH₵ 10</option>
                <option>2.5GB - GH₵ 20</option>
                <option>5GB - GH₵ 40</option>
            </select>
        </div>

        <button type="submit" class="btn">Confirm Order</button>
    </form>
    <p class="footer-text">Secure Transaction via GanyoKripto DeFi</p>
</div>

<script>
    // This script can be connected to your Google Sheet via a Webhook
    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        alert("Order Recorded! (Connecting to Sheet...)");
    };
</script>

</body>
</html>
