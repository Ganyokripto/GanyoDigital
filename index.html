<script>
let activeNet='MTN', activePkg='', activePrice='';
const packages=[
{v:"1GB",p:"5.5"},{v:"2GB",p:"10"},{v:"3GB",p:"15"},
{v:"4GB",p:"20"},{v:"5GB",p:"25"},{v:"6GB",p:"30"},
{v:"7GB",p:"35"},{v:"8GB",p:"40"},{v:"10GB",p:"45"}
];

function renderPackages(){
document.getElementById('pkgGrid').innerHTML = packages.map(p=>`
<div class="pkg-btn" onclick="setPkg('${p.v}','¢${p.p}',this)">
${p.v}<br>¢${p.p}
</div>`).join('');
}

function setNet(net,el){
activeNet=net;
document.querySelectorAll('.net-btn').forEach(b=>b.classList.remove('active'));
el.classList.add('active');
}

function setPkg(pkg,price,el){
activePkg=pkg; activePrice=price;
document.querySelectorAll('.pkg-btn').forEach(b=>b.classList.remove('active'));
el.classList.add('active');
}

/* ORDER COUNTER */
let orderCount = parseInt(localStorage.getItem('GanyoData')) || 0; 
document.getElementById('totalOrders').innerText = orderCount.toLocaleString();

/* 🔥 MAIN ORDER FUNCTION (WHATSAPP + SMS) */
function sendOrder(){
    let phone = document.getElementById('orderPhone').value;

    if(!activePkg || !phone){ 
        alert("Select bundle and enter number"); 
        return; 
    }

    // Convert to 233 format if user enters 0XXXXXXXXX
    if(phone.startsWith("0")){
        phone = "233" + phone.substring(1);
    }

    // Increase counter
    orderCount++;
    localStorage.setItem('GanyoData', orderCount);
    document.getElementById('totalOrders').innerText = orderCount.toLocaleString();

    // WhatsApp message (TO YOU)
    const rawMsg = `🚀 NEW DATA ORDER
----------------------
Network: ${activeNet}
Recipient: ${phone}
Bundle: ${activePkg} (${activePrice})
----------------------`;

    const encodedMsg = encodeURIComponent(rawMsg);

    // Open WhatsApp
    window.open(`https://wa.me/233505332010?text=${encodedMsg}`, "_blank");


    /* =========================
       📩 SMS TO CUSTOMER
       ========================= */
    const smsMessage = `Your ${activePkg} (${activePrice}) order on ${activeNet} has been received. Processing shortly.`;

    const apiKey = "YOUR_API_KEY"; // 🔴 PUT YOUR REAL API KEY HERE
    const sender = "GanyoData";

    const smsURL = "https://sms.gonlinesites.com/app/sms/api" +
        "?action=send-sms" +
        "&api_key=" + apiKey +
        "&to=" + phone +
        "&from=" + sender +
        "&sms=" + encodeURIComponent(smsMessage);

    fetch(smsURL)
        .then(res => res.text())
        .then(data => console.log("SMS Sent:", data))
        .catch(err => console.error("SMS Error:", err));
}

/* TIMER */
const target=new Date("May 30, 2026 00:00:00").getTime();
setInterval(()=>{
let diff=target-new Date().getTime();
if(diff<0){ document.getElementById("timer").innerText="LIVE"; return; }
let d=Math.floor(diff/86400000), h=Math.floor((diff%86400000)/3600000), m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000);
document.getElementById("timer").innerText=`${d}:${h<10?'0'+h:h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
},1000);

/* QUIZ */
const quiz=[
{q:"What is known as the 'Digital Gold'?", o:["Ethereum","Bitcoin","Solana"], c:1},
{q:"What does NFT stand for?", o:["New Financial Tool","Non-Fungible Token","National Fund Trust"], c:1},
{q:"Which of these is a stablecoin?", o:["USDT","Dogecoin","Litecoin"], c:0},
{q:"DeFi stands for?", o:["Decentralized Finance","Digital Finance","Detailed File"], c:0},
{q:"What is a private key used for?", o:["Sharing on social media","Accessing your wallet","Creating a password"], c:1}
];

let score=0, curQ=0;
function nextQ(){
curQ = Math.floor(Math.random()*quiz.length);
let q=quiz[curQ];
document.getElementById("qText").innerText=q.q;
document.getElementById("qOptions").innerHTML=q.o.map((opt,i)=>`
<button class="option-btn" onclick="check(${i})">${opt}</button>`).join('');
document.getElementById("qRes").innerText="";
}

function check(i){
const isCorrect = i === quiz[curQ].c;
if(isCorrect) score++;
document.getElementById("qRes").innerText=isCorrect ? "✅ Correct!" : "❌ Wrong!";
document.getElementById("qRes").style.color=isCorrect ? "green" : "red";
document.getElementById("score").innerText=score;
}

renderPackages();
nextQ();

/* DAILY INSIGHT */
const dailyContent = [
{
quote: "The best time to buy Bitcoin was 10 years ago. The second best time is today.",
reason: "W-Boost is built on smart contracts and NFTs, giving you full ownership."
},
{
quote: "Knowledge is the only asset the market cannot take away.",
reason: "Your progress is stored on-chain as NFT."
},
{
quote: "Freedom is the ability to exit anytime.",
reason: "Sell your NFT position anytime on marketplace."
}
];

function updateDailyInsight() {
const now = new Date();
const start = new Date(now.getFullYear(), 0, 0);
const diff = now - start;
const oneDay = 1000 * 60 * 60 * 24;
const dayOfYear = Math.floor(diff / oneDay);

const index = dayOfYear % dailyContent.length;
const today = dailyContent[index];

document.getElementById('daily-quote').innerText = `"${today.quote}"`;
document.getElementById('vboost-reason').innerText = today.reason;
}

updateDailyInsight();
</script>
